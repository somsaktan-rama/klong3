<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">บันทึกมิเตอร์คลอง 3</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; margin: 20px; background-color: #f9f9f9;}
      .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      h2 { text-align: center; color: #333; margin-top: 0; }
      .row { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      select, input { padding: 8px 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 150px;}
      button { padding: 10px 20px; font-size: 16px; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s;}
      button:hover { background: #0b5ed7; }
      button:disabled { background: #6c757d; cursor: not-allowed; }
      #status { margin-top: 10px; text-align: center; font-size: 14px; font-weight: bold; width: 100%; display: block;}
      .group { display: flex; flex-direction: column; width: 100%; gap: 5px; }
      label { font-weight: bold; color: #555; }
      .note { color: #dc3545; font-size: 13px; font-weight: bold; }
      .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #e7f3ff; border-radius: 8px; border: 1px solid #b6d4fe; }
      .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 id="pageHeader">📝 บันทึกมิเตอร์คลอง 3</h2>

      <div id="lineProfile" class="user-info" style="display:none;">
        <img id="profileImg" src="" alt="profile">
        <div>ผู้บันทึก: <span id="lineName" style="font-weight:bold; color:#0d6efd;">...</span></div>
      </div>
      <div id="pcMode" class="user-info" style="display:none; background: #f8f9fa; border-color: #dee2e6;">
        <div>💻 <strong>โหมดผู้ดูแล (PC):</strong> ไม่ต้องลงชื่อเข้าใช้ LINE</div>
      </div>

      <div class="row"><div class="group"><label for="elist">⚡ มิเตอร์ไฟ (E):</label><select id="elist" onchange="onPick('E')"><option value="">⏳ กำลังโหลดข้อมูล...</option></select></div></div>
      <div class="row"><div class="group"><label for="wlist">💧 มิเตอร์น้ำ (W):</label><select id="wlist" onchange="onPick('W')"><option value="">⏳ กำลังโหลดข้อมูล...</option></select></div></div>

      <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

      <div class="row"><div class="group"><label>⬅️ ค่าก่อนหน้า <span id="lastMonth" style="font-weight:normal; color:#888;"></span>:</label><input id="lastValue" type="number" readonly style="background:#e9ecef;"></div></div>
      <div class="row"><div class="group"><label>➡️ ค่าปัจจุบัน <span id="currMonthLabel" style="font-weight:normal; color:#0d6efd;"></span>:</label><input id="newValue" type="number" inputmode="decimal" step="any" oninput="updateDiff()" placeholder="กรอกค่าปัจจุบัน"><span id="currMeta" class="note"></span></div></div>
      <div class="row"><div class="group" style="flex-direction:row; justify-content:space-between; background:#f8f9fa; padding:10px; border-radius:6px;"><label style="margin:0;">ผลต่างการใช้งาน:</label><span id="diff" style="font-weight:bold; font-size:18px;">0</span></div></div>

      <div class="row" style="margin-top: 20px;">
        <button id="saveBtn" onclick="saveData()">💾 บันทึกข้อมูล</button>
        <span id="status"></span>
      </div>
    </div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzpVcY2tAoDDyxUwl3tqobYxYgm-DHJ6SqwTcAHpAAD2Dz17-AtXfl3naB8xI4YhMq9/exec"; 
      const LIFF_ID = "2009770064-DQfU7Y80"; 

      let userProfile = null;
      let lastVal = 0;

      async function main() {
        try {
          await liff.init({ liffId: LIFF_ID });
          const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

          if (liff.isLoggedIn()) {
            userProfile = await liff.getProfile();
            document.getElementById('lineProfile').style.display = 'flex';
            document.getElementById('lineName').textContent = userProfile.displayName;
            document.getElementById('profileImg').src = userProfile.pictureUrl;
          } else {
            if (isMobile) liff.login();
            else document.getElementById('pcMode').style.display = 'block';
          }
        } catch (err) {
          console.warn("LIFF Init Failed:", err);
          document.getElementById('pcMode').style.display = 'block';
        }
        loadLists();
      }

      function loadLists() {
        fetch(WEB_APP_URL + "?action=getLists")
          .then(r => r.json())
          .then(res => {
            // 📌 อัปเดต Title และ Header ด้วยเดือน-ปี ปัจจุบัน
            if (res.currentMonthTitle) {
               document.getElementById('pageTitle').innerText = "บันทึกมิเตอร์คลอง 3: " + res.currentMonthTitle;
               document.getElementById('pageHeader').innerText = "📝 บันทึกมิเตอร์คลอง 3: " + res.currentMonthTitle;
            }

            const el = document.getElementById('elist'), wl = document.getElementById('wlist');
            el.innerHTML = '<option value="">-- เลือกมิเตอร์ไฟ --</option>';
            wl.innerHTML = '<option value="">-- เลือกมิเตอร์น้ำ --</option>';
            if(res.E) res.E.forEach(item => el.add(new Option(item.desc, item.id)));
            if(res.W) res.W.forEach(item => wl.add(new Option(item.desc, item.id)));
          });
      }

      function onPick(group) {
        if (group === 'E') document.getElementById('wlist').selectedIndex = 0;
        else document.getElementById('elist').selectedIndex = 0;
        const id = (group === 'E' ? document.getElementById('elist') : document.getElementById('wlist')).value;
        if (id) loadInfo(id);
      }

      function loadInfo(id) {
        document.getElementById('saveBtn').disabled = true;
        fetch(WEB_APP_URL + "?action=getInfo&id=" + id)
          .then(r => r.json())
          .then(res => {
            lastVal = Number(res.lastValue || 0);
            document.getElementById('lastValue').value = lastVal;
            document.getElementById('lastMonth').textContent = res.lastMonth ? `(${res.lastMonth})` : '';
            document.getElementById('currMonthLabel').textContent = res.currMonth ? `(${res.currMonth})` : '';
            document.getElementById('newValue').value = (res.currValue !== '' && res.currValue != null) ? res.currValue : lastVal;
            updateDiff();
            document.getElementById('currMeta').textContent = res.currNote ? `* หมายเหตุเดิม: ${res.currNote}` : '';
            document.getElementById('saveBtn').disabled = false;
          });
      }

      function updateDiff() {
        const newVal = Number(document.getElementById('newValue').value || 0);
        const diff = newVal - lastVal;
        const diffElem = document.getElementById('diff');
        diffElem.textContent = diff.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
        diffElem.style.color = diff < 0 ? '#dc3545' : '#0d6efd'; 
      }

      async function saveData() {
        const id = document.getElementById('elist').value || document.getElementById('wlist').value;
        const val = Number(document.getElementById('newValue').value || 0);
        const diff = val - lastVal; // 📌 คำนวณผลต่าง
        const status = document.getElementById('status'), btn = document.getElementById('saveBtn');
        
        if (!id) return alert('⚠️ กรุณาเลือกรายการ');
        btn.innerText = '⏳ กำลังบันทึก...'; btn.disabled = true;

        try {
            let ip = "Unknown IP";
            const ipServices = ['https://api.ipify.org?format=json', 'https://jsonip.com/', 'https://api.seeip.org/jsonip'];
            for (let url of ipServices) {
                try {
                    const r = await fetch(url); const d = await r.json();
                    if (d.ip) { ip = d.ip; break; }
                } catch (e) {}
            }

            const ua = navigator.userAgent;
            const isMobile = /Mobi|Android|iPhone/i.test(ua);
            const isLine = /Line/i.test(ua);
            const os = navigator.platform;
            
            let noteString = "";
            if (isMobile) {
                const displayName = userProfile ? userProfile.displayName : "Unknown Mobile";
                const device = ua.match(/\(([^)]+)\)/) ? ua.match(/\(([^)]+)\)/)[1].split(';')[0] : "Mobile";
                if (isLine) noteString = `(mobile LINE app) ${displayName},${device},${os},LINE,${ip}`;
                else noteString = `(mobile) ${window.screen.width}x${window.screen.height},${device},${os},Browser,${ip}`;
            } else {
                noteString = `(PC) ${os},Browser,${ip}`;
            }

            // 📌 ยิง API แนบค่า diff ไปด้วยเพื่อเซฟลงชีต Usage
            const response = await fetch(`${WEB_APP_URL}?action=saveValue&id=${id}&val=${val}&diff=${diff}&ua=${encodeURIComponent(noteString)}`);
            const res = await response.json();

            if (res.status === 'success') {
                status.style.color = "#198754";
                status.textContent = `✅ บันทึกสำเร็จ (${res.timeStr})`;
                loadInfo(id); 
            } else { throw new Error(res.message); }
        } catch (err) {
            status.style.color = "#dc3545";
            status.textContent = '❌ ล้มเหลว: ' + err.message;
        } finally {
            btn.innerText = '💾 บันทึกข้อมูล'; btn.disabled = false;
        }
      }

      window.onload = main;
    </script>
  </body>
</html>
