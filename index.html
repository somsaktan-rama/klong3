<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กรอก meter คลอง 3 (LIFF)</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      /* ใช้ Style เดิมจากโค้ดของคุณ [cite: 24-35] */
      body { font-family: 'Segoe UI', Sarabun, sans-serif; margin: 20px; background-color: #f9f9f9;}
      .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .row { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      select, input { padding: 8px 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; flex: 1; }
      button { padding: 10px 20px; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
      #status { margin-top: 10px; text-align: center; font-weight: bold; width: 100%; display: block;}
      .group { display: flex; flex-direction: column; width: 100%; gap: 5px; }
      label { font-weight: bold; }
      .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #e7f3ff; border-radius: 8px; }
      .user-info img { width: 40px; height: 40px; border-radius: 50%; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>📝 บันทึกมิเตอร์ (LIFF Mode)</h2>

      <div id="lineProfile" class="user-info" style="display:none;">
        <img id="profileImg" src="" alt="profile">
        <div>สวัสดีคุณ: <span id="lineName" style="font-weight:bold;">...</span></div>
      </div>

      <div class="row">
        <div class="group">
          <label for="elist">⚡ มิเตอร์ไฟ (E):</label>
          <select id="elist" onchange="onPick('E')"></select>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="wlist">💧 มิเตอร์น้ำ (W):</label>
          <select id="wlist" onchange="onPick('W')"></select>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label>ค่าเดือนก่อนหน้า:</label>
          <input id="lastValue" type="number" readonly style="background:#eee;">
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label>ค่าปัจจุบัน:</label>
          <input id="newValue" type="number" inputmode="decimal" oninput="updateDiff()">
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label>ผลต่าง: <span id="diff">0</span></label>
        </div>
      </div>

      <button id="saveBtn" onclick="saveData()">💾 บันทึกข้อมูล</button>
      <span id="status"></span>
    </div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzklH6nDFcGYXz7UqZyqaQnmQSs8ERptGMz6adRaB07lfzNnEEPjcN5DEq4V10L6spK/exec"; 
      const LIFF_ID = "2009770064-DQfU7Y80"; // 📌 ใส่ LIFF ID ที่ได้จาก LINE Developers

      let userProfile = null;
      let lastVal = 0;

      // 📌 เริ่มต้นใช้งาน LIFF
      async function main() {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          userProfile = await liff.getProfile();
          document.getElementById('lineProfile').style.display = 'flex';
          document.getElementById('lineName').textContent = userProfile.displayName;
          document.getElementById('profileImg').src = userProfile.pictureUrl;
        } else {
          liff.login();
        }
        loadLists();
      }

      function loadLists() {
        fetch(WEB_APP_URL + "?action=getLists")
          .then(r => r.json())
          .then(res => {
            const el = document.getElementById('elist');
            const wl = document.getElementById('wlist');
            el.innerHTML = '<option value="">-- เลือกมิเตอร์ไฟ --</option>';
            wl.innerHTML = '<option value="">-- เลือกมิเตอร์น้ำ --</option>';
            res.E.forEach(item => el.add(new Option(item.desc, item.id)));
            res.W.forEach(item => wl.add(new Option(item.desc, item.id)));
          });
      }

      function onPick(group) {
        const id = (group === 'E') ? document.getElementById('elist').value : document.getElementById('wlist').value;
        if (group === 'E') document.getElementById('wlist').selectedIndex = 0;
        else document.getElementById('elist').selectedIndex = 0;
        if (id) loadInfo(id);
      }

      function loadInfo(id) {
        fetch(WEB_APP_URL + "?action=getInfo&id=" + id)
          .then(r => r.json())
          .then(res => {
            lastVal = Number(res.lastValue || 0);
            document.getElementById('lastValue').value = lastVal;
            document.getElementById('newValue').value = res.currValue || lastVal;
            updateDiff();
          });
      }

      function updateDiff() {
        const newVal = Number(document.getElementById('newValue').value || 0);
        document.getElementById('diff').textContent = (newVal - lastVal).toFixed(2);
      }

      async function saveData() {
        const id = document.getElementById('elist').value || document.getElementById('wlist').value;
        const val = document.getElementById('newValue').value;
        const status = document.getElementById('status');
        
        if (!id) return alert('กรุณาเลือกรายการ');

        status.textContent = '⏳ กำลังบันทึก...';

        // 1. ดึง IP
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();

        // 2. ข้อมูลเครื่องและ LINE
        const ua = navigator.userAgent;
        const displayName = userProfile ? userProfile.displayName : "Unknown";
        const displaySize = `${window.screen.width}x${window.screen.height}`;
        
        // 📌 จัดรูปแบบ Note ตามโจทย์: (mobile LINE app) line_displayname,device,OS,browser,IP
        let noteString = `(mobile LINE app) ${displayName},${displaySize},${navigator.platform},LINE,${ipData.ip}`;

        // 3. ยิง API บันทึก (ใช้ action saveValue ที่แก้ใหม่ใน code.gs )
        fetch(`${WEB_APP_URL}?action=saveValue&id=${id}&val=${val}&ua=${encodeURIComponent(noteString)}`)
          .then(r => r.json())
          .then(res => {
            status.textContent = '✅ บันทึกสำเร็จ: ' + res.timeStr;
            liff.closeWindow(); // ปิดหน้าต่าง LIFF ทันทีเมื่อเสร็จ
          });
      }

      main();
    </script>
  </body>
</html>
