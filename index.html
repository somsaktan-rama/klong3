<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กรอก meter คลอง 3 (17/11/68)</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .row { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      select, input { padding: 6px; font-size: 16px; }
      button { padding: 8px 16px; background: #4CAF50; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
      button:hover { background: #3F9A49; }
      #diff { font-weight: bold; color: blue; }
      #status { margin-left: 8px; }
      .group { display: inline-flex; align-items: center; gap: 6px; }
      label { min-width: 140px; }
      .stack { display: flex; flex-direction: column; gap: 8px; }
      .current-row { display: flex; align-items: center; gap: 8px; }
      .note { color: #666; font-size: 13px; }
    </style>
  </head>
  <body>
    <h2>กรอก meter คลอง 3</h2>

    <div class="stack">
      <div class="row">
        <div class="group">
          <label for="elist">มิเตอร์ไฟ (E001–E030):</label>
          <select id="elist" onchange="onPick('E')"></select>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="wlist">มิเตอร์น้ำ (W001–W026):</label>
          <select id="wlist" onchange="onPick('W')"></select>
        </div>
      </div>
    </div>

    <div class="row">
      <label>ค่าของเดือนก่อนหน้า:</label>
      <input id="lastValue" type="number" readonly>
      <span id="lastMonth"></span>
    </div>

    <div class="row current-row">
      <label for="newValue">ค่าปัจจุบัน:</label>
      <input id="newValue" type="number" inputmode="decimal" step="any" oninput="updateDiff()" placeholder="กรอกค่าปัจจุบัน">
      <button onclick="saveData()">💾 บันทึกข้อมูล</button>
      <span id="status"></span>
    </div>

    <div class="row">
      <label></label>
      <span id="currMeta" class="note"></span>
    </div>

    <div class="row">
      <label>ผลต่าง:</label>
      <span id="diff">0</span>
    </div>

    <script>
      // 📌 วาง Web App URL ที่ได้จาก Google Apps Script ที่นี่
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzsn1fzH1D5Br15LdcOqS5ilwMwwJhqRe1YhxdNmMiVHHP0hRVJmqrkNsvLSqOgWwyJ/exec"; 
      
      let lastVal = 0;

      // โหลด 2 กลุ่มรายการ: E และ W ดึงข้อมูลผ่าน API (GET)
      async function loadLists() {
        try {
          const response = await fetch(WEB_APP_URL + "?action=getLists");
          const res = await response.json();

          const el = document.getElementById('elist');
          const wl = document.getElementById('wlist');

          el.appendChild(new Option('-- เลือก E001–E030 --', '', true, false));
          wl.appendChild(new Option('-- เลือก W001–W026 --', '', true, false));

          (res.E || []).forEach(item => el.appendChild(new Option(item.desc, item.id)));
          (res.W || []).forEach(item => wl.appendChild(new Option(item.desc, item.id)));

          if (res.E && res.E.length) {
            el.selectedIndex = 1;
            onPick('E');
          }
        } catch (err) {
          alert('ไม่สามารถโหลดรายชื่อได้: ' + err.message);
        }
      }

      function onPick(group) {
        const el = document.getElementById('elist');
        const wl = document.getElementById('wlist');
        const status = document.getElementById('status');
        status.textContent = '';
        if (group === 'E') {
          wl.selectedIndex = 0;
          const id = el.value;
          if (id) loadInfo(id);
        } else {
          el.selectedIndex = 0;
          const id = wl.value;
          if (id) loadInfo(id);
        }
      }

      // โหลดข้อมูล "เดือนก่อนหน้า" และ "เดือนปัจจุบัน" (GET)
      async function loadInfo(id) {
        try {
          const response = await fetch(WEB_APP_URL + "?action=getInfo&id=" + id);
          const res = await response.json();

          lastVal = Number(res.lastValue || 0);
          document.getElementById('lastValue').value = lastVal;
          document.getElementById('lastMonth').textContent = res.lastMonth ? `(${res.lastMonth})` : '(ไม่มีข้อมูลก่อนหน้า)';

          const newInput = document.getElementById('newValue');
          const currMeta = document.getElementById('currMeta');

          if (res.currValue !== '' && res.currValue != null) {
            newInput.value = res.currValue;
            updateDiff();
          } else {
            newInput.value = '';
            document.getElementById('diff').textContent = '0';
            document.getElementById('diff').style.color = 'blue';
          }

          if (res.currNote) {
            const label = res.currMonth ? res.currMonth : 'เดือนนี้';
            currMeta.textContent = `มีข้อมูลเดิมใน ${label} • Note: ${res.currNote}`;
          } else {
            currMeta.textContent = '';
          }
        } catch (err) {
          alert('ดึงข้อมูลล้มเหลว: ' + err.message);
        }
      }

      function updateDiff() {
        const newVal = Number(document.getElementById('newValue').value || 0);
        const diff = newVal - lastVal;
        const diffElem = document.getElementById('diff');
        diffElem.textContent = diff;
        diffElem.style.color = diff < 0 ? 'red' : 'blue';
      }

      // บันทึกข้อมูล (POST)
      async function saveData() {
        const el = document.getElementById('elist');
        const wl = document.getElementById('wlist');
        const id = el.value || wl.value;
        const newVal = Number(document.getElementById('newValue').value || 0);
        const status = document.getElementById('status');

        if (!id) { alert('กรุณาเลือกรายการจาก E หรือ W'); return; }

        const lastField = document.getElementById('lastValue').value;
        if (lastField !== '' && !Number.isNaN(lastVal) && newVal < lastVal) {
          alert('ค่าปัจจุบันต้องมากกว่าหรือเท่ากับเดือนก่อนหน้า');
          return;
        }

        status.textContent = '⏳ กำลังบันทึก...';
        const ua = navigator.userAgent || '';

        try {
          // ใช้ Content-Type text/plain เพื่อหลีกเลี่ยงปัญหา CORS preflight
          const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ id: id, newValue: newVal, userAgent: ua }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          
          const res = await response.json();

          if (res.status === 'success') {
            status.textContent = `${res.data.message} • เวลา ${res.data.timeStr}`;
            loadInfo(id); 
          } else {
            status.textContent = '❌ ' + res.message;
          }
        } catch (err) {
          status.textContent = '❌ ดึงข้อมูลล้มเหลว: ' + err.message;
        }
      }

      // เริ่มทำงานเมื่อเปิดหน้าเว็บ
      window.onload = loadLists;
    </script>
  </body>
</html>
