<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klong3 Meter Data Entry V1.00</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <h3 class="text-center mb-4 text-primary">บันทึกค่าไฟ-ค่าน้ำ Klong3</h3>
        
        <form id="meterForm">
            <div class="mb-3">
                <label class="form-label">ชื่อผู้บันทึก *</label>
                <input type="text" id="recorderName" class="form-control" required placeholder="ระบุชื่อของคุณ">
            </div>

            <div class="mb-3">
                <label class="form-label">ประเภทมิเตอร์</label>
                <select id="meterType" class="form-select" required onchange="filterData()">
                    <option value="">-- เลือกประเภท --</option>
                    <option value="E">ไฟฟ้า (E001-E030)</option>
                    <option value="W">น้ำประปา (W001-W026)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">ข้อมูลลูกค้า (ID | Meter | ชื่อ)</label>
                <select id="customerSelect" class="form-select" required onchange="updatePreviousData()" disabled>
                    <option value="">-- กรุณาเลือกประเภทมิเตอร์ก่อน --</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">ประจำเดือน (คอลัมน์)</label>
                <select id="monthSelect" class="form-select" required onchange="updatePreviousData()" disabled>
                    </select>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label text-muted">ค่าเดือนที่แล้ว</label>
                    <input type="number" id="prevValue" class="form-control" readonly placeholder="ดึงข้อมูล...">
                </div>
                <div class="col-6">
                    <label class="form-label text-danger fw-bold">ค่าเดือนปัจจุบัน *</label>
                    <input type="number" id="currentValue" class="form-control" required placeholder="ระบุตัวเลข">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn" disabled>
                <span id="btnText">บันทึกข้อมูล</span>
            </button>
        </form>
    </div>
</div>

<script>
    // --- ตั้งค่าตัวแปรของคุณที่นี่ ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx0DHRLQKgr1GhpW_Mj4ga3hMwciCBbnt5qyAPdswvpDqoAkFB8Ag62uoMlp_xjFzpE/exec"; // นำ URL ที่ได้จาก GAS มาใส่ที่นี่ (ต้องลงท้ายด้วย /exec)
    // ---------------------------------

    let allSheetData = [];
    let headers = [];

    // 1. โหลดข้อมูลจาก Google Sheet
    async function loadDataFromSheet() {
        try {
            console.log("กำลังเชื่อมต่อไปที่:", GAS_URL);
            const response = await fetch(GAS_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            allSheetData = data.data;
            headers = data.headers;
            
            // ตั้งค่า Dropdown เดือน (ข้าม 4 คอลัมน์แรก: ID, no, meter, customer)
            const monthSelect = document.getElementById('monthSelect');
            monthSelect.innerHTML = '<option value="">-- เลือกเดือน --</option>';
            for (let i = 4; i < headers.length; i++) {
                if(headers[i]) {
                    monthSelect.innerHTML += `<option value="${headers[i]}">${headers[i]}</option>`;
                }
            }
            monthSelect.disabled = false;
            console.log("โหลดข้อมูลสำเร็จ!");

        } catch (error) {
            console.error('Fetch Error:', error);
            alert('ไม่สามารถโหลดข้อมูลจากระบบได้ กรุณาตรวจสอบ:\n1. URL ของ GAS ถูกต้องหรือไม่\n2. สิทธิ์การเข้าถึง Web App เป็น "ทุกคน" (Anyone) หรือไม่\n\nรายละเอียด Error: ' + error.message);
        }
    }

    // 2. กรองข้อมูลตามประเภท (น้ำ/ไฟ)
    function filterData() {
        const type = document.getElementById('meterType').value;
        const select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- เลือกลูกค้า --</option>';
        
        if (!type) {
            select.disabled = true;
            document.getElementById('submitBtn').disabled = true;
            return;
        }

        const filtered = allSheetData.filter(row => row.Klong3ID && row.Klong3ID.startsWith(type));
        
        filtered.forEach(row => {
            select.innerHTML += `<option value="${row.Klong3ID}">${row.Klong3ID} | ${row.meter} | ${row.customer}</option>`;
        });
        
        select.disabled = false;
        document.getElementById('submitBtn').disabled = false;
        updatePreviousData();
    }

    // 3. อัปเดตค่าเดือนที่แล้ว
    function updatePreviousData() {
        const id = document.getElementById('customerSelect').value;
        const targetMonth = document.getElementById('monthSelect').value;
        const prevInput = document.getElementById('prevValue');
        
        if (!id || !targetMonth) {
            prevInput.value = "";
            return;
        }

        const targetIndex = headers.indexOf(targetMonth);
        if(targetIndex > 4) { 
            const prevMonthHeader = headers[targetIndex - 1];
            const customerData = allSheetData.find(row => row.Klong3ID === id);
            
            if(customerData && customerData[prevMonthHeader]) {
                prevInput.value = customerData[prevMonthHeader];
            } else {
                prevInput.value = "0"; 
            }
        } else {
            prevInput.value = "0"; 
        }
    }

    // 4. ส่งข้อมูลกลับไปบันทึก
    document.getElementById('meterForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const recorderName = document.getElementById('recorderName').value; // ดึงชื่อจากช่องกรอก
        const klong3ID = document.getElementById('customerSelect').value;
        const targetMonth = document.getElementById('monthSelect').value;
        const prevValue = parseFloat(document.getElementById('prevValue').value || 0);
        const currentValue = parseFloat(document.getElementById('currentValue').value);

        // ตรวจสอบเงื่อนไข: ค่าต้องไม่น้อยกว่าเดือนที่แล้ว
        if (currentValue < prevValue) {
            alert(`ข้อมูลผิดพลาด: ค่าที่ป้อน (${currentValue}) น้อยกว่าเดือนที่แล้ว (${prevValue})`);
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = 'กำลังบันทึก...';

        const payload = {
            klong3ID: klong3ID,
            targetMonth: targetMonth,
            value: currentValue,
            lineName: recorderName // ส่งชื่อที่กรอกไปแทน LINE Display Name
        };

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            });
            
            const result = await response.json();
            if (result.status === "success") {
                alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
                document.getElementById('meterForm').reset();
                document.getElementById('prevValue').value = "";
                filterData(); 
            } else {
                alert('เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: ' + result.message);
            }
        } catch (error) {
            console.error('Post Error:', error);
            alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'บันทึกข้อมูล';
        }
    });

    // เริ่มทำงานเมื่อเปิดหน้าเว็บ
    window.onload = async () => {
        await loadDataFromSheet();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
